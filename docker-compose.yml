# Dev environment: PostgreSQL with TimescaleDB + pgvector
# Usage: docker-compose up -d
services:
  db:
    image: timescale/timescaledb-ha:pg18
    container_name: tradememory-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tradememory
      - POSTGRES_PASSWORD=tradememory
      - POSTGRES_DB=tradememory
    volumes:
      - pgdata:/home/postgres/pgdata/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradememory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
